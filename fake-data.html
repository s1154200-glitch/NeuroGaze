<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NeuroGaze — Fake Data Generator</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0a0f17;color:#ddd;padding:28px}
    .card{background:#07101a;border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;max-width:820px;margin:0 auto}
    h1{margin:0 0 8px;font-size:20px}
    label{display:block;margin-top:10px}
    input[type=number]{width:86px}
    button{margin-top:12px;padding:10px 12px;border-radius:8px;border:0;background:#7c5cfc;color:white;cursor:pointer}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:#ccc}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    pre{background:#041018;padding:12px;border-radius:8px;overflow:auto;color:#9fd}
    .small{font-size:13px;color:#99a}
  </style>
</head>
<body>
  <div class="card">
    <h1>NeuroGaze — Fake Data Generator</h1>
    <div class="small">Creates realistic-looking entries in localStorage so you can test the app quickly.</div>

    <label>Number of entries to generate:
      <input id="count" type="number" value="5" min="1" max="200">
    </label>

    <label class="row">
      <label><input id="genCpt" type="checkbox" checked> CPT (Go/No-Go)</label>
      <label><input id="genFix" type="checkbox" checked> Fixation Stability</label>
      <label><input id="genAnti" type="checkbox" checked> Antisaccade</label>
      <label><input id="genDr" type="checkbox" checked> Distractor Recovery (DR)</label>
      <label><input id="genCal" type="checkbox" checked> Calibration data</label>
    </label>

    <label style="margin-top:14px">Profile:
      <select id="profile" style="margin-left:8px;padding:5px 10px;background:#07101a;color:#ddd;border:1px solid rgba(255,255,255,0.1);border-radius:6px">
        <option value="mixed">Mixed (random)</option>
        <option value="td">Non-ADHD (typical development)</option>
        <option value="adhd">ADHD (elevated biomarkers)</option>
      </select>
    </label>

    <div class="row">
      <button id="genBtn">Generate Fake Data</button>
      <button id="clearBtn" class="ghost">Clear NeuroGaze Data</button>
      <button id="showBtn" class="ghost">Show localStorage Keys</button>
    </div>

    <h3 style="margin-top:16px">Preview / Log</h3>
    <pre id="log">Ready.</pre>
  </div>

  <script>
  // Utility randoms
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randint(min, max) { return Math.floor(rand(min, max + 1)); }
  function nowOffset(days) { return Date.now() - (days || 0) * 24 * 60 * 60 * 1000; }

  // Profile helpers — return a range [min,max] scaled by profile
  function rng(tdMin, tdMax, adhdMin, adhdMax, profile) {
    if (profile === 'td')   return rand(tdMin, tdMax);
    if (profile === 'adhd') return rand(adhdMin, adhdMax);
    return Math.random() < 0.5 ? rand(tdMin, tdMax) : rand(adhdMin, adhdMax);
  }

  // Fake CPT entry generator (matches js/cpt-test.js saved shape)
  function makeCptEntry(ts, profile) {
    var commissionRate = parseFloat(rng(0, 14, 26, 60, profile).toFixed(1));
    var omissionRate   = parseFloat(rng(0, 14, 26, 55, profile).toFixed(1));
    var meanRt  = parseFloat(rand(280, 560).toFixed(0));
    var rtv     = parseFloat(rng(20, 80, 120, 280, profile).toFixed(1));
    var gazeWander = parseFloat(rng(0, 20, 30, 70, profile).toFixed(1));
    var s0 = { trials: randint(20,120), omiRate: parseFloat(rand(0,20).toFixed(1)), avgRt: Math.round(rand(300,520)), gazeWander: parseFloat(rand(0,40).toFixed(1)) };
    var s1 = { trials: randint(20,120), omiRate: parseFloat((s0.omiRate + rand(-6,12)).toFixed(1)), avgRt: Math.round(s0.avgRt + rand(-30,60)), gazeWander: parseFloat((s0.gazeWander + rand(-10,20)).toFixed(1)) };
    var decayDelta = Math.max(0, s1.omiRate - s0.omiRate);
    var prob = Math.min(1, (commissionRate/100)*0.25 + (rtv/400)*0.3 + (omissionRate/100)*0.2 + (gazeWander/100)*0.15 + (decayDelta/100)*0.1);
    return { name: 'CPT (Go/No-Go)', time: ts, commissionRate, omissionRate, rtv, gazeWander, decayDelta, prob, meanRt, s0, s1 };
  }

  // Minimal fake entries for other tests (structure approximations)
  function makeFixationEntry(ts, profile) {
    var bcea    = parseFloat(rng(0.3, 1.4, 3.1, 8.0, profile).toFixed(2));
    var swj     = profile === 'adhd' ? randint(5, 15) : profile === 'td' ? randint(0, 3) : randint(0, 12);
    var qePct   = parseFloat(rng(0.62, 0.97, 0.22, 0.55, profile).toFixed(3));
    var driftPct = parseFloat(rng(0, 0.2, 0.3, 0.7, profile).toFixed(3));
    var temporalBuckets = [parseFloat(rand(0,1).toFixed(3)), parseFloat(rand(0,1).toFixed(3)), parseFloat(rand(0,1).toFixed(3))];
    var prob = Math.min(1, (bcea / 10) * 0.4 + Math.max(0, driftPct) * 0.2 + (swj / 20) * 0.25 + (1 - qePct) * 0.15);
    var sampleCount = randint(20, 200);
    var xs = [], ys = [];
    for (var i = 0; i < Math.min(sampleCount, 120); i++) { xs.push(parseFloat(rand(-10,10).toFixed(2))); ys.push(parseFloat(rand(-10,10).toFixed(2))); }
    return { name: 'Fixation Stability Test', time: ts, bcea, prob, swj, qePct, driftPct, temporalBuckets, xs, ys };
  }

  function makeAntisaccadeEntry(ts, profile) {
    var total  = randint(20, 80);
    var maxErr = profile === 'td' ? Math.floor(total * 0.18) : profile === 'adhd' ? Math.floor(total * 0.55) : Math.floor(total * 0.4);
    var errors = randint(0, maxErr);
    var latencies = [];
    for (var i = 0; i < total; i++) latencies.push(Math.random() < 0.05 ? null : Math.round(rand(160, 520)));
    var validLat = latencies.filter(function(v){ return v !== null; });
    var meanLat = validLat.length ? validLat.reduce(function(a,b){return a+b;},0)/validLat.length : null;
    var sdLat   = validLat.length > 1 ? (function(arr){ var m = arr.reduce((s,v)=>s+v,0)/arr.length; return Math.sqrt(arr.reduce((s,v)=>s+(v-m)*(v-m),0)/(arr.length-1)); })(validLat) : null;
    var cv      = (meanLat && sdLat) ? (sdLat/meanLat)*100 : null;
    var meanCor = Math.round(rand(80, 400));
    var prob    = Math.min(1, (errors/total)*0.55 + (cv ? cv/200 : 0.2)*0.30 + (meanCor/600)*0.15);
    return {
      name: 'Antisaccade Test', time: ts,
      errorRate: parseFloat(((errors/total)*100).toFixed(1)),
      meanLat: meanLat !== null ? Math.round(meanLat) : null,
      cv: cv !== null ? parseFloat(cv.toFixed(2)) : null,
      meanCor, prob,
      latencies: validLat.slice(0,120).map(function(v){ return Math.round(v); }),
      totalTrials: total, errorCount: errors
    };
  }

  // DR — matches exact shape saved by distractor-recovery-test.js
  // adhdProb is 0-100 integer; avgGrl in ms; capturePct & offTaskPct in %
  function makeDrEntry(ts, profile) {
    var avgGrl     = parseFloat(rng(180, 390, 720, 1100, profile).toFixed(0));
    var capturePct = parseFloat(rng(0, 25, 45, 90, profile).toFixed(1));
    var offTaskPct = parseFloat(rng(0, 15, 30, 70, profile).toFixed(1));
    // reproduce app scoring logic
    var GRL_TD = 400, GRL_ADHD = 700, CAP_TD = 20, CAP_ADHD = 50, OT_TD = 10, OT_ADHD = 40;
    var grlScore = avgGrl <= GRL_TD ? 0 : avgGrl >= GRL_ADHD ? 100 : (avgGrl - GRL_TD)/(GRL_ADHD - GRL_TD)*100;
    var capScore = capturePct <= CAP_TD ? 0 : capturePct >= CAP_ADHD ? 100 : (capturePct - CAP_TD)/(CAP_ADHD - CAP_TD)*100;
    var otScore  = offTaskPct <= OT_TD  ? 0 : offTaskPct >= OT_ADHD  ? 100 : (offTaskPct - OT_TD)/(OT_ADHD - OT_TD)*100;
    var adhdProb = Math.round(grlScore*0.50 + capScore*0.25 + otScore*0.25);
    return {
      test: 'distractor-recovery',
      date: new Date(ts).toISOString(),
      adhdProb, avgGrl, capturePct, offTaskPct
    };
  }

  // Calibration keys used by dashboard/analyze pages
  function makeCalData(ts) {
    return {
      done: true,
      accuracy: parseFloat(rand(80,98).toFixed(1)),
      time: ts
    };
  }

  function appendHistory(arr) {
    try {
      var raw = localStorage.getItem('neurogaze_test_history');
      var h = raw ? JSON.parse(raw) : [];
      h = h.concat(arr);
      localStorage.setItem('neurogaze_test_history', JSON.stringify(h));
      return true;
    } catch (e) { console.error(e); return false; }
  }

  function appendDr(arr) {
    try {
      var raw = localStorage.getItem('neurogaze_dr_results');
      var h = raw ? JSON.parse(raw) : [];
      h = h.concat(arr);
      localStorage.setItem('neurogaze_dr_results', JSON.stringify(h));
      return true;
    } catch (e) { console.error(e); return false; }
  }

  document.getElementById('genBtn').addEventListener('click', function () {
    var count = Math.max(1, parseInt(document.getElementById('count').value,10) || 1);
    var doCpt  = document.getElementById('genCpt').checked;
    var doFix  = document.getElementById('genFix').checked;
    var doAnti = document.getElementById('genAnti').checked;
    var doDr   = document.getElementById('genDr').checked;
    var doCal  = document.getElementById('genCal').checked;
    var profile = document.getElementById('profile').value;

    var cpt = [], fix = [], anti = [], dr = [], cal = null;
    for (var i = 0; i < count; i++) {
      var ts = nowOffset(rand(0, 7));
      if (doCpt)  cpt.push(makeCptEntry(ts - i*60000, profile));
      if (doFix)  fix.push(makeFixationEntry(ts - i*45000, profile));
      if (doAnti) anti.push(makeAntisaccadeEntry(ts - i*50000, profile));
      if (doDr)   dr.push(makeDrEntry(ts - i*30000, profile));
      if (doCal && !cal) cal = makeCalData(Date.now());
    }

    var out = [];
    if (cpt.length) { appendHistory(cpt); out.push('CPT: ' + cpt.length); }
    if (fix.length) { appendHistory(fix); out.push('Fixation: ' + fix.length); }
    if (anti.length) { appendHistory(anti); out.push('Antisaccade: ' + anti.length); }
    if (dr.length) { appendDr(dr); out.push('DR: ' + dr.length); }
    if (cal) {
      localStorage.setItem('neurogaze_cal_done', 'true');
      localStorage.setItem('neurogaze_cal_accuracy', JSON.stringify(cal.accuracy));
      localStorage.setItem('neurogaze_cal_time', JSON.stringify(cal.time));
      out.push('Calibration: done');
    }

    document.getElementById('log').textContent = 'Wrote: ' + out.join(', ') + '\n\nUse the app pages to verify.';
  });

  document.getElementById('clearBtn').addEventListener('click', function () {
    var keys = ['neurogaze_test_history','neurogaze_dr_results','neurogaze_cal_done','neurogaze_cal_accuracy','neurogaze_cal_time'];
    keys.forEach(function(k){ localStorage.removeItem(k); });
    document.getElementById('log').textContent = 'Cleared keys: ' + keys.join(', ');
  });

  document.getElementById('showBtn').addEventListener('click', function () {
    var out = [];
    for (var i=0;i<localStorage.length;i++) {
      var k = localStorage.key(i);
      if (k.indexOf('neurogaze') === 0) out.push(k + ': ' + (localStorage.getItem(k) || '').slice(0,200));
    }
    document.getElementById('log').textContent = out.length ? out.join('\n\n') : 'No neurogaze keys found in localStorage';
  });
  </script>
</body>
</html>
